steps:
  # Build Flask API image
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/t2s-eval-api:$COMMIT_SHA
      - -f
      - Dockerfile
      - .

  # Build Cloud Run Job image
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/t2s-eval-runner:$COMMIT_SHA
      - -f
      - runner/Dockerfile
      - .

  # Push both images
  - name: gcr.io/cloud-builders/docker
    args: [push, gcr.io/$PROJECT_ID/t2s-eval-api:$COMMIT_SHA]

  - name: gcr.io/cloud-builders/docker
    args: [push, gcr.io/$PROJECT_ID/t2s-eval-runner:$COMMIT_SHA]

images:
  - gcr.io/$PROJECT_ID/t2s-eval-api:$COMMIT_SHA
  - gcr.io/$PROJECT_ID/t2s-eval-runner:$COMMIT_SHA
